apiVersion: kafka.strimzi.io/v1beta2
kind: Kafka
metadata:
  name: shipping-kafka
  namespace: kafka
spec:
  kafka:
    version: 3.8.0
    replicas: 9    # 3 per rack; scaled down to 3 in dev
    listeners:
      - name: plain
        port: 9092
        type: internal
        tls: false
      - name: tls
        port: 9093
        type: internal
        tls: true
    config:
      # KRaft mode — no ZooKeeper
      process.roles: broker
      offsets.topic.replication.factor: 3
      transaction.state.log.replication.factor: 3
      transaction.state.log.min.isr: 2
      default.replication.factor: 3
      min.insync.replicas: 2
      log.retention.hours: 168      # 7 days
      log.segment.bytes: 1073741824 # 1 GiB
      compression.type: lz4
    storage:
      type: jbod
      volumes:
        - id: 0
          type: persistent-claim
          size: 500Gi
          class: ssd
    rack:
      topologyKey: topology.kubernetes.io/zone
    resources:
      requests:
        memory: 8Gi
        cpu: "2"
      limits:
        memory: 16Gi
        cpu: "4"
    metricsConfig:
      type: jmxPrometheusExporter
      valueFrom:
        configMapKeyRef:
          name: kafka-metrics
          key: kafka-metrics-config.yml
  zookeeper:
    # KRaft mode — field kept for schema compatibility but unused
    replicas: 0
    storage:
      type: ephemeral
  entityOperator:
    topicOperator: {}
    userOperator: {}

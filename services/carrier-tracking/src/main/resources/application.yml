spring:
  application:
    name: carrier-tracking
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    schema-registry-url: ${SCHEMA_REGISTRY_URL:http://localhost:8081}
    consumer:
      group-id: carrier-tracking
  cassandra:
    contact-points: ${SCYLLADB_CONTACT_POINTS:localhost}
    port: ${SCYLLADB_PORT:9042}
    keyspace-name: shipping
    local-datacenter: datacenter1

camel:
  springboot:
    main-run-controller: false

carrier:
  edi:
    mode: ${CARRIER_EDI_MODE:file}    # 'sftp' in staging/prod
    ack:
      drop: ${CARRIER_EDI_ACK_DROP:./edi-ack}

server:
  port: 8084

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus

otel:
  service:
    name: carrier-tracking
  exporter:
    otlp:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://otel-collector:4317}

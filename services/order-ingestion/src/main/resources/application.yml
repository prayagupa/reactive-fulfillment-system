spring:
  application:
    name: order-ingestion

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    schema-registry-url: ${SCHEMA_REGISTRY_URL:http://localhost:8081}
    consumer:
      group-id: order-ingestion

  data:
    redis:
      host: ${VALKEY_HOST:localhost}
      port: ${VALKEY_PORT:6379}

  cassandra:
    contact-points: ${SCYLLADB_CONTACT_POINTS:localhost}
    port: ${SCYLLADB_PORT:9042}
    keyspace-name: shipping
    local-datacenter: datacenter1

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus,info
  metrics:
    export:
      prometheus:
        enabled: true

otel:
  service:
    name: order-ingestion
  exporter:
    otlp:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://otel-collector:4317}

logging:
  structured:
    format:
      console: json
